name: Build Docker image, push, and update Helm for EKS Deployment

on:
  workflow_dispatch:
    inputs:
      ENVIRONMENT:
        description: 'Selection of Deployment Environment is Mandatory'
        required: true
        default: 'Dev'
        type: choice
        options:
          - Dev
          - Stage
          - Prod

env:
  IMAGE_NAME: ramesh0621/backend-1
  IMAGE_TAG: ${{ github.run_number }}

jobs:
  setting_up_environment:
    runs-on: ubuntu-latest
    steps:
      - name: Print Deployment Environment
        run: |
          echo "Deployment To Environment: ${{ github.event.inputs.ENVIRONMENT }}"

  File_System_Scan:
    runs-on: ubuntu-latest
    needs: setting_up_environment
    steps:
      - name: CheckOut Git Repository
        uses: actions/checkout@v3

      - name: Install trivy on Runner
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy File System Scan
        run: |
          echo "Running File System Security Scan"
          trivy fs --severity HIGH,CRITICAL --format table -o trivy-fs-report.txt .

      - name: Upload FS Scan Report
        uses: actions/upload-artifact@v3
        with:
          name: trivy-fs-report
          path: trivy-fs-report.txt

  docker_login_build_tag_push:
    runs-on: ubuntu-latest
    needs: File_System_Scan
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Tag Docker Image
        run: |
          echo "Building Docker image $IMAGE_NAME:$IMAGE_TAG"
          docker build -t $IMAGE_NAME:$IMAGE_TAG -f Dockerfile2 .
          echo "Tagging Latest as well"
          docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest

      - name: Push Image to Docker Hub
        run: |
          echo "Pushing Docker images to Docker Hub"
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest

  image_tag_updater_for_helm:
    runs-on: ubuntu-latest
    needs: docker_login_build_tag_push
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Installation of yq (GO Version)
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Update Helm Values and commiting changes
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
        run: |
          ENV="${{ github.event.inputs.ENVIRONMENT }}"
          # Convert to lowercase in Bash to avoid '()' error
          ENV_LOWER=$(echo "$ENV" | tr '[:upper:]' '[:lower:]')

          if [ "$ENV" == "Dev" ]; then
              envFile=helm/values_dev.yaml
          elif [ "$ENV" == "Stage" ]; then
              envFile=helm/values_stage.yaml
          else
              envFile=helm/values_prod.yaml
          fi

          echo "Updating Helm values file ${envFile} with image tag ${IMAGE_TAG}"
          yq e ".images.version = \"${IMAGE_TAG}\"" -i $envFile

          echo "Testing Helm templates for $ENV environment"
          helm template myapp1 helm/ -f $envFile --namespace $ENV_LOWER
          
          echo "commiting changes to Github Repo."
          git config user.email "jenkins@example.com"
          git config user.name "Jenkins"
          git add ${envFile}
          git commit -m "Update ${ENV} image tag to ${IMAGE_TAG}" || echo "No changes to commit"
          git push https://${GITHUB_TOKEN}@github.com/Rameshmamuduru/devops-exam-app.git HEAD:master
