name: Building an docker image and pushing to DockerHub and then do image updater for EKS Deployment By argoCD

on:
  workflow_dispatch:
    input:
      ENVIRONMENT:
        description: 'Selection of Deployment Environment is Mandatory'
        required: true
        default: 'dev'
        type: choice
        options:
          - Dev
          - Stage
          - Prod

env:
  IMAGE_NAME: ramesh0621/backend-1
  IMAGE_TAG: ${{ github.run_number }}

jobs:
  Setting_up Environment:
    runs-on: ubuntu-latest
    steps:
      - name: Setting-up the environment from User Input
        run: |
          echo "Deployment To Environment: ${{ github.event.inputs.ENVIRONMENT }}"
  Checkout:
    runs-on: ubuntu-latest
    steps:
      - name: CheckOut Git Repository
        uses: actions/checkout@v3

  File-System Scan:
    runs-on: ubuntu-latest
    needs: onarQube-Analisys
    steps:
      - name: CheckOut Git Repository
        uses: actions/checkout@v3

      - name: Trivy File System Scan
        run: |
          echo "Running File System Security Scan"
          trivy fs --severity HIGH,CRITICAL --format table -o trivy-fs-report.txt .

      - name: Upload FS Scan Report
        uses: actions/upload-artifact@v3
        with:
          name: trivy-fs-report
          path: trivy-fs-report.txt

  Docker Login Build Tag & Push:
    runs-on: ubuntu-latest
    needs: File-System Scan

    steps:
      - name: CheckOut Git Repository
        uses: actions/checkout@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build $ Tag
        run: |
          echo "Building Docker image $IMAGE_NAME:$IMAGE_TAG"
          docker build -t $IMAGE_NAME:$IMAGE_TAG -f Dockerfile2 .
          echo "Tagging Latest as well"
          docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest

      - name: Push Image to Docker Hub
        run: |
          echo "Push docker images to Docker Hub"
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest

  Image Tag Updater for Helm:
    runs-on: unbuntu-latest
    needs: Docker Login Build Tag & Push
    steps:
      - name: CheckOut Git Repository
        uses: actions/checkout@v3
      - name: update Helm Values
        run: |
          buildTag=${IMAGE_TAG}
          if [ "${{ github.event.inputs.ENVIRONMENT }}" == "Dev"]; Then
            envFile=helm/values_dev.yaml
          elif [ "${{ github.event.inputs.ENVIRONMENT }}" == "Stage"]; Then
            envFile=helm/values_Stage.yaml
          esle
            envFile=helm/values_Stage.yaml
          fi

          echo "Updating Helm values file ${envFile} with image tag ${buildTag}"
          yq e ".images.version = \"${buildTag}\"" -i $envFile

          echo "Testing Helm templates for ${{ github.event.inputs.ENVIRONMENT }} environment"
          helm template myapp1 helm/ -f $envFile --namespace ${{ github.event.inputs.ENVIRONMENT.toLowerCase }}

      - name: commit & push changes to Repository
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
        run: |
          echo "commit & push changes to Repository"
          git config user.email "jenkins@example.com"
          git config user.name "Jenkins"
          git add ${envFile}
          git commit -m "Update ${github.event.inputs.ENVIRONMENT} image tag to ${IMAGE_TAG}"
          git push https://${TOKEN}@github.com/Rameshmamuduru/devops-exam-app.git HEAD:master








        

      


