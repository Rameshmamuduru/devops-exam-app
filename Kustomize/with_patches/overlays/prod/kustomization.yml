apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

nameSuffix: -prod

namePrefix: app1-

labels:
  - pairs:
      env: prod
    includeSelectors: true

replicas:
  - name: backend
    count: 4
  - name: mysql
    count: 3

patchesJson6902:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: backend
    path: patch_deployment.yml
    