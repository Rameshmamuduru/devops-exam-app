apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

nameSuffix: -dev

namePrefix: app1-

labels:
  - pairs:
      env: dev
    includeSelectors: true

replicas:
  - name: backend
    count: 2
  - name: mysql
    count: 2

patches:
  - path: patch_deployment.yml
    target:
      kind: Deployment
      name: backend


    
